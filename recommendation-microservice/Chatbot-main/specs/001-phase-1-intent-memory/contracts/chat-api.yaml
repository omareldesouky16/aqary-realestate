openapi: 3.0.3
info:
  title: Aqary Chatbot Phase 1 Chat Contract
  version: 1.0.0
  description: Contract for Phase 1 intent detection, memory, reference handling, redirects, and fallback behavior.
paths:
  /api/chat:
    post:
      summary: Send a chat message
      description: Accepts an authenticated user message and returns the chatbot reply plus Phase 1 state indicators.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
      responses:
        '200':
          description: Chat turn processed successfully or with a friendly fallback.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
        '401':
          description: Missing or invalid authentication.
        '403':
          description: Session belongs to another user.
        '422':
          description: Invalid request shape or malformed session identifier.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    ChatRequest:
      type: object
      required:
        - session_id
        - message
      properties:
        session_id:
          type: string
          format: uuid
        message:
          type: string
          minLength: 1
        context_property_id:
          type: integer
          nullable: true
          description: Optional first-turn property context from a property detail page.
    ChatResponse:
      type: object
      required:
        - reply
        - intent
        - isComplaint
        - installment_redirect
        - awaiting_slots
        - resolved_property_id
        - properties
        - show_image_offer
        - has_more
        - min_price_fallback
        - session_id
      properties:
        reply:
          type: string
        intent:
          type: string
          enum:
            - search_property
            - property_details
            - complaint
            - installment_redirect
            - chitchat
            - unclear
            - system_error
        isComplaint:
          type: boolean
        needsCheckIn:
          type: boolean
        installment_redirect:
          type: boolean
        awaiting_slots:
          type: array
          items:
            type: string
        resolved_property_id:
          type: integer
          nullable: true
        resolved_by:
          type: string
          nullable: true
          enum:
            - position
            - title_match
            - id_explicit
        user_reference:
          type: string
          nullable: true
        properties:
          type: array
          items:
            $ref: '#/components/schemas/PropertyReference'
        show_image_offer:
          type: boolean
        has_more:
          type: boolean
        min_price_fallback:
          type: number
          nullable: true
        session_id:
          type: string
          format: uuid
        fallback:
          type: boolean
          description: True when a friendly fallback was returned after interpretation failure.
    PropertyReference:
      type: object
      required:
        - id
        - title
        - url
      properties:
        id:
          type: integer
        title:
          type: string
          description: Seller-supplied text; clients must render safely.
        url:
          type: string
        position:
          type: integer
          minimum: 1
