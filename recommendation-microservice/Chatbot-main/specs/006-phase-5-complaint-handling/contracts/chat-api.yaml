openapi: 3.0.3
info:
  title: Aqary Chatbot Phase 5 Complaint Handling Contract
  version: 1.0.0
  description: Contract extension for authenticated complaint routing, complaint state persistence, and follow-up phone validation.
paths:
  /api/chat:
    post:
      summary: Send a chat message with complaint handling support
      description: Accepts an authenticated buyer message and returns the chatbot reply plus complaint state, session state, and safe visible context.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
      responses:
        '200':
          description: Chat turn processed successfully or with a friendly fallback.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
        '401':
          description: Missing or invalid authentication.
        '403':
          description: Session belongs to another user.
        '422':
          description: Invalid request shape, malformed session identifier, or invalid message content.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    ChatRequest:
      type: object
      required:
        - session_id
        - message
      properties:
        session_id:
          type: string
          format: uuid
        message:
          type: string
          minLength: 1
        context_property_id:
          type: integer
          nullable: true
          description: Optional property context from an earlier visible result or property page.
    ChatResponse:
      type: object
      required:
        - reply
        - intent
        - isComplaint
        - needsCheckIn
        - installment_redirect
        - awaiting_slots
        - resolved_property_id
        - properties
        - session_id
      properties:
        reply:
          type: string
          description: Language-appropriate assistant reply grounded in returned data.
        intent:
          type: string
          enum:
            - search_property
            - property_details
            - complaint
            - installment_redirect
            - chitchat
            - unclear
            - system_error
        isComplaint:
          type: boolean
        needsCheckIn:
          type: boolean
        installment_redirect:
          type: boolean
        awaiting_slots:
          type: array
          items:
            type: string
        resolved_property_id:
          type: integer
          nullable: true
        resolved_by:
          type: string
          nullable: true
          enum:
            - position
            - title_match
            - id_explicit
            - page_context
        user_reference:
          type: string
          nullable: true
        complaint_case:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/ComplaintCase'
        properties:
          type: array
          maxItems: 5
          description: Visible ranked result context. Seller phone numbers are never included.
          items:
            $ref: '#/components/schemas/SearchResultItem'
        show_image_offer:
          type: boolean
        has_more:
          type: boolean
        min_price_fallback:
          type: number
          nullable: true
        session_id:
          type: string
          format: uuid
        fallback:
          type: boolean
    ComplaintCase:
      type: object
      required:
        - status
        - stage
        - phone_status
        - follow_up_phone_attempts
        - reviewable
      properties:
        status:
          type: string
          enum:
            - active
            - saved
            - declined
            - fallback_pending
        stage:
          type: string
          enum:
            - check_in
            - awaiting_issue
            - awaiting_phone
            - invalid_phone_retry
            - saved
            - declined
        issue_summary:
          type: string
          nullable: true
        phone_status:
          type: string
          enum:
            - none
            - pending
            - valid
            - invalid
            - declined
        follow_up_phone:
          type: string
          nullable: true
          description: Canonical normalized phone number, only present after validation succeeds.
        follow_up_phone_normalized:
          type: string
          nullable: true
          description: Canonical normalized phone number used by the implementation for review-safe state.
        follow_up_phone_attempts:
          type: integer
          minimum: 0
        reviewable:
          type: boolean
        events:
          type: array
          items:
            $ref: '#/components/schemas/ComplaintEvent'
    ComplaintEvent:
      type: object
      required:
        - type
        - stage
        - created_at
      properties:
        type:
          type: string
          enum:
            - started
            - soft_check_in
            - issue_captured
            - phone_requested
            - phone_invalid
            - phone_accepted
            - phone_declined
            - saved
            - fallback
        stage:
          type: string
        message:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true
    SearchResultItem:
      type: object
      required:
        - id
        - title
        - url
        - position
      properties:
        id:
          type: integer
        title:
          type: string
          description: Seller-supplied text; clients must render safely.
        url:
          type: string
          format: uri-reference
        position:
          type: integer
          minimum: 1
          maximum: 5
